  '<div class="panel"><div class="ptitle">Ranking de Areas</div>'+apro.slice().sort(function(a,b){var pa=gp(hMes,hAnio).areas[a].paises||[],pb=gp(hMes,hAnio).areas[b].paises||[];return calcAvg(gp(hMes,hAnio).areas[b].procs,pb.length?pb:null).avg-calcAvg(gp(hMes,hAnio).areas[a].procs,pa.length?pa:null).avg;}).map(function(area,i){var ps=gp(hMes,hAnio).areas[area].paises||[],res=calcAvg(gp(hMes,hAnio).areas[area].procs,ps.length?ps:null),ad=gp(hMes,hAnio).areas[area],comp=getCompleteness(ad.procs,ps.length?ps:null);var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";return'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">'+(medal||'<span style="font-size:11px;color:#546e7a;width:20px;text-align:center">'+(i+1)+'</span>')+'</span><span style="font-size:12px;font-weight:600;color:'+(AC[area]||"#2dd4c0")+'">'+area+'</span></div><div style="display:flex;align-items:center;gap:8px">'+miniRing(comp.pct)+'<span style="font-size:15px;font-weight:800;color:'+pc(res.avg)+'">'+res.avg.toFixed(1)+'%</span></div></div>';}).join("")+'</div>')+
  (function(){var html='',allColabs=[];AREAS_CON_COLAB.forEach(function(area){var colabs=COLABORADORES[area]||[],cd2=(gp(hMes,hAnio).colabs||{})[area]||{};colabs.forEach(function(col,ci){var cd=cd2[ci]||{};if(cd.st!=="aprobado"&&cd.st!=="editado")return;var cr=calcColabAvg(cd.procs||[]);if(cr.fil===0)return;allColabs.push({nombre:col.nombre,puesto:col.puesto,area:area,avg:cr.avg,ci:ci});});});if(!allColabs.length)return"";allColabs.sort(function(a,b){return b.avg-a.avg;});return'<div class="panel"><div class="ptitle">Ranking Colaboradores</div>'+allColabs.map(function(c,i){var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";return'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">'+(medal||'<span style="font-size:11px;color:#546e7a;width:20px;text-align:center">'+(i+1)+'</span>')+'</span><div><div style="font-size:12px;font-weight:600">'+c.nombre+'</div><div style="font-size:10px;color:#94b8cc">'+c.puesto+' - <span style="color:'+(AC[c.area]||"#2dd4c0")+'">'+c.area+'</span></div></div></div><span style="font-size:15px;font-weight:800;color:'+pc(c.avg)+'">'+c.avg.toFixed(1)+'%</span></div>';}).join("")+'</div>';})();
}

function vCEOTendencias(){
  return ceoAnualSel()+'<div class="panel"><div class="ptitle">Tendencia Anual '+hAnual+'</div><div class="scrollx"><table class="tbl"><thead><tr><th>Area</th>'+MESES.map(function(m){return'<th style="font-size:10px;text-align:center">'+m.slice(0,3)+'</th>';}).join("")+'<th style="text-align:center">Prom</th></tr></thead><tbody>'+AREAS.map(function(area){var vals=MESES.map(function(m){return getAreaAvg(area,m,hAnual);});var filled=vals.filter(function(v){return v!==null;});var prom=filled.length?filled.reduce(function(s,v){return s+v;},0)/filled.length:null;return'<tr><td style="font-size:12px;font-weight:600;color:'+(AC[area]||"#2dd4c0")+'">'+area+'</td>'+vals.map(function(v,i){var prev=vals.slice(0,i).filter(function(x){return x!==null;}).pop();var trend=v!==null&&prev!==null?(v>prev?"▲":v<prev?"▼":"→"):"";return'<td style="text-align:center">'+(v!==null?'<span style="font-size:11px;color:'+pc(v)+'">'+v.toFixed(1)+'%</span><span style="font-size:9px;color:'+(trend==="▲"?"#2dd4c0":trend==="▼"?"#f87171":"#94b8cc")+'"> '+trend+'</span>':"<span style='color:#546e7a;font-size:11px'>—</span>")+'</td>';}).join("")+'<td style="text-align:center">'+(prom!==null?'<span style="font-size:12px;font-weight:700;color:'+pc(prom)+'">'+prom.toFixed(1)+'%</span>':"—")+'</td></tr>';}).join("")+'</tbody></table></div></div>'+
  '<div class="panel"><div class="ptitle">Comparativo por Trimestre '+hAnual+'</div><div class="kg">'+["Q1","Q2","Q3","Q4"].map(function(q){var meses=Q_MAP[q]||[];var vals=AREAS.map(function(a){return getQAvg(a,q,hAnual);}).filter(function(v){return v!==null;});var qAvg=vals.length?vals.reduce(function(s,v){return s+v;},0)/vals.length:null;return'<div class="kc" style="border-top:2px solid '+(qAvg!==null?pc(qAvg):"#546e7a")+'"><div class="kl">'+q+'</div><div style="font-size:11px;color:#546e7a;margin-bottom:4px">'+meses.join(", ")+'</div><div class="kv" style="color:'+(qAvg!==null?pc(qAvg):"#546e7a")+'">'+(qAvg!==null?qAvg.toFixed(1)+"%":"---")+'</div></div>';}).join("")+'</div></div>';
}

function bindAll(){
  function bnd(id,fn){var el=document.getElementById(id);if(el)el.addEventListener("change",fn);}
  bnd("s_mes",function(e){curMes=e.target.value;R();});
  bnd("s_anio",function(e){curAnio=e.target.value;R();});
  bnd("h_m1",function(e){if(hView==="paises"){hPaisMes=e.target.value;}else{hMes=e.target.value;}R();});
  bnd("h_a1",function(e){if(hView==="paises"){hPaisAnio=e.target.value;}else{hAnio=e.target.value;}R();});
  bnd("h_m2",function(e){hMes2=e.target.value;R();});
  bnd("h_a2",function(e){hAnio2=e.target.value;R();});
  bnd("h_q1",function(e){hQ=e.target.value;R();});
  bnd("h_qa1",function(e){hQA=e.target.value;R();});
  bnd("h_q2",function(e){hQ2=e.target.value;R();});
  bnd("h_qa2",function(e){hQA2=e.target.value;R();});
  bnd("h_anual",function(e){hAnual=e.target.value;R();});
  bnd("h_pm",function(e){hPaisMes=e.target.value;R();});
  bnd("h_pa",function(e){hPaisAnio=e.target.value;R();});
  bnd("h_pais_a",function(e){hPaisA=e.target.value;R();});
  bnd("h_pais_b",function(e){hPaisB=e.target.value;R();});
  bnd("ceo_mes",function(e){hMes=e.target.value;R();});
  bnd("ceo_anio",function(e){hAnio=e.target.value;R();});
  bnd("ceo_anual",function(e){hAnual=e.target.value;R();});
  ["mes","q","cmpmes","cmpq","anual","completeness","paises","colabs"].forEach(function(t){var el=document.getElementById("htab_"+t);if(el)el.addEventListener("click",function(){hView=t;R();});});
  var hpst=document.getElementById("hpais_sub_tabla"),hpsc=document.getElementById("hpais_sub_cmp"),hpsr=document.getElementById("hpais_sub_resumen");
  if(hpst)hpst.addEventListener("click",function(){hPaisSubView="tabla";R();});
  if(hpsc)hpsc.addEventListener("click",function(){hPaisSubView="cmp";R();});
  if(hpsr)hpsr.addEventListener("click",function(){hPaisSubView="resumen";R();});
  ["historico","areas","colabs","rankings","tendencias"].forEach(function(t){var el=document.getElementById("ceotab_"+t);if(el)el.addEventListener("click",function(){ceoView=t;ceoArea=null;ceoColab=null;R();});});
  if(U&&U.role==="lider"){
    var area=U.area,ad=cp().areas[area],paises=ad.paises||[];
    if(paises.length){document.querySelectorAll("[data-mi]").forEach(function(el){el.addEventListener("input",function(){var idx=parseInt(el.dataset.mi),pa=el.dataset.mp,f=el.dataset.mf,p=ad.procs[idx];if(f==="c"){if(!p.cp)p.cp={};p.cp[pa]=el.value;}else if(f==="v"){if(!p.cpv)p.cpv={};p.cpv[pa]=el.value;}else if(f==="n"){if(!p.cpn)p.cpn={};p.cpn[pa]=el.value;}});});}
    else{document.querySelectorAll("[data-i][data-f]").forEach(function(el){el.addEventListener("input",function(){ad.procs[parseInt(el.dataset.i)][el.dataset.f]=el.value;});});}
    document.querySelectorAll("[data-ci][data-f]").forEach(function(el){el.addEventListener("input",function(){if(selColab===null)return;var cd=cp().colabs[area][selColab];if(!cd||!cd.procs)return;cd.procs[parseInt(el.dataset.ci)][el.dataset.f]=el.value;scheduleSave();});});
  }
  if(U&&U.role==="do"&&DF){var adF=cp().areas[DF],paisesF=adF.paises||[];if(!paisesF.length){document.querySelectorAll("[data-fi][data-f]").forEach(function(el){el.addEventListener("input",function(){adF.procs[parseInt(el.dataset.fi)][el.dataset.f]=el.value;});});}}
  if(U&&U.role==="do"&&doColabArea!==null&&doColabIdx!==null){var cdF=cp().colabs[doColabArea][doColabIdx];if(cdF)document.querySelectorAll("[data-dci][data-f]").forEach(function(el){el.addEventListener("input",function(){if(cdF.procs)cdF.procs[parseInt(el.dataset.dci)][el.dataset.f]=el.value;});});}
  bindGestionar();
}
